name: Release fux-voice.exe

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build fux-voice.exe
        run: pyinstaller --clean --noconfirm installer\fux-voice.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (!(Test-Path "dist\fux-voice.exe")) {
            Write-Error "Build fehlgeschlagen — dist\fux-voice.exe nicht vorhanden"
            exit 1
          }
          $size = (Get-Item "dist\fux-voice.exe").Length / 1MB
          Write-Host ("Build OK — fux-voice.exe ({0:N2} MB)" -f $size)

      - name: Compute checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash dist\fux-voice.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  fux-voice.exe" | Out-File -FilePath dist\fux-voice.exe.sha256 -Encoding ascii -NoNewline

      - name: Upload artifact (fuer manuelle Runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: fux-voice-windows
          path: |
            dist/fux-voice.exe
            dist/fux-voice.exe.sha256

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/fux-voice.exe
            dist/fux-voice.exe.sha256
          generate_release_notes: true
          draft: false
          prerelease: false
